# Static preview config only: Netlify does not execute PHP from this repo.
# Production should use a PHP host (e.g. Hostinger) with .htaccess routing.

[build]
  publish = "."

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = false

[[redirects]]
  from = "/features.html"
  to = "/features"
  status = 301
  force = false

[[redirects]]
  from = "/pricing.html"
  to = "/pricing"
  status = 301
  force = false

[[redirects]]
  from = "/about.html"
  to = "/about"
  status = 301
  force = false

[[redirects]]
  from = "/thank-you.html"
  to = "/thank-you"
  status = 301
  force = false
